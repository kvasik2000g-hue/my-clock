kind = "web"
previewPath = "/"
title = "Часы"
version = "1.0.0"
id = "artifacts/clock"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18943

[services.development]
run = "pnpm --filter @workspace/clock run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clock", "run", "build" ]
publicDir = "artifacts/clock/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18943"
BASE_PATH = "/"
